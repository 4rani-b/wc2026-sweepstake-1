name: Update Leaderboard

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC = 09:00 BST every day
  workflow_dispatch:        # also allows manual run from GitHub Actions tab

# Prevent two runs racing to push docs/index.html at the same time.
# A new trigger cancels any run already in progress.
concurrency:
  group: update-leaderboard
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate leaderboard
        working-directory: src
        env:
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python main.py

      - name: Commit and push updated leaderboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Leaderboard update $(date -u '+%Y-%m-%d %H:%M UTC')"
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $attempt failed, retrying..."
              [ $attempt -eq 3 ] && { echo "All push attempts failed"; exit 1; }
            done
          fi
